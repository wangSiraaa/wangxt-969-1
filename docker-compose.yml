version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eldercare-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: eldercare123
      MYSQL_DATABASE: eldercare
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-peldercare123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eldercare-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eldercare-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - backend

volumes:
  mysql_data:
