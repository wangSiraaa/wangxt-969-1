version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: eldercare-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - eldercare-network

  frontend:
    build:
      context: ./frontend
    container_name: eldercare-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - eldercare-network

volumes:
  backend-logs:

networks:
  eldercare-network:
    driver: bridge
